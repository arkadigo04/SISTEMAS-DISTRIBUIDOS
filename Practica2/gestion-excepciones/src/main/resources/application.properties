spring.application.name=gestion-excepciones
# Configuracion del puerto del servidor web
server.port=8080

# Configuracion de la base de datos en memoria (H2)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuracion de Hibernate/JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Habilitar la consola web de H2 (opcional, pero util)
spring.h2.console.enabled=true