<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Licencia Pokémon</title>
    <link rel="stylesheet" th:href="@{/css/forgot.css}">
</head>
<body>
<div class="box">
    <img th:src="@{/img/International_Pokémon_logo.svg}" alt="Logo" style="width: 160px; margin-bottom: 15px;">
    <h2>Centro de Recuperación</h2>
    <p class="subtitle">Introduce tu nombre de entrenador para localizar tu ficha en la base de datos.</p>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:action="@{/forgot-password}" method="post">
        <input type="text" name="username" placeholder="Tu nombre de usuario" required autofocus>
        <button type="submit" class="btn-verify">Buscar mi cuenta</button>
    </form>
    <a href="/login" class="back-link">Volver al inicio de sesión</a>
</div>
</body>
</html>
