<!DOCTYPE html>
<html lang="es">
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Licencia</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; margin-top: 100px;}
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 350px; border-top: 5px solid #ffc107;}
        input { padding: 10px; margin: 10px 0; width: calc(100% - 22px); border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 12px 20px; background-color: #ffc107; color: #333; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase;}
        .error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px;}
        a { color: #007bff; text-decoration: none; font-size: 0.9em; display: block; margin-top: 15px;}
    </style>
</head>
<body>
<div class="box">
    <h2>Centro de Recuperación</h2>
    <p style="font-size: 0.9em; color: gray;">Introduce tu nombre de entrenador para buscar tu ficha.</p>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/forgot-password}" method="post">
        <input type="text" name="username" placeholder="Nombre de usuario" required>
        <button type="submit">Buscar mi cuenta</button>
    </form>

    <a href="/login">🔙 Volver al inicio</a>
</div>
</body>
</html>
