<!DOCTYPE html>
<html lang="es">
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pruebas de Excepciones</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9;}
        .contenedor { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .btn { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold;}
        .btn-archivo { background-color: #007bff; }
        .btn-bd { background-color: #dc3545; }
        .btn-api { background-color: #28a745; }
        .alerta-error { background-color: #f8d7da; color: #721c24; padding: 15px; margin-top: 20px; border-radius: 5px; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Simulador de Excepciones (Spring Boot -> Python)</h1>
        <p>Haz clic en los botones para forzar excepciones en Python y observar cómo Spring Boot las intercepta y traduce amigablemente:</p>

        <div>
            <a href="/probar/archivo"><button class="btn btn-archivo">1. Forzar Error de Archivo</button></a>
            <a href="/probar/basedatos"><button class="btn btn-bd">2. Forzar Error de Base de Datos</button></a>
            <a href="/probar/pokemon"><button class="btn btn-api">3. Forzar Error PokeAPI</button></a>
        </div>

        <div th:if="${error_traducido}" class="alerta-error">
            <h3 style="margin-top:0;">Información del Error</h3>
            <p th:text="${error_traducido}"></p>
        </div>
    </div>
</body>
</html>
