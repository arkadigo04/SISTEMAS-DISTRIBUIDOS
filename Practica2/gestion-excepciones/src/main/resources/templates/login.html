<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Pokédex</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; margin-top: 100px;}
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 350px; border-top: 5px solid #28a745;}
        input { padding: 10px; margin: 10px 0; width: calc(100% - 22px); border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;}
        button { padding: 12px 20px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; margin-top: 10px;}
        button:hover { background-color: #218838; }

        .alert-error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px; border-left: 4px solid #721c24; text-align: left; font-size: 0.9em;}
        .alert-success { color: #155724; background-color: #d4edda; padding: 10px; border-radius: 5px; margin-bottom: 15px; border-left: 4px solid #155724; text-align: left; font-size: 0.9em;}

        .links-container { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; font-size: 0.9em; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .link-danger { color: #dc3545; }
    </style>
</head>
<body>
<div class="box">
    <h2 style="margin-top: 0; color: #333;">Iniciar Sesión</h2>

    <div th:if="${param.error}" class="alert-error">
        ❌ Usuario o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}" class="alert-success">
        👋 Has cerrado sesión correctamente.
    </div>
    <div th:if="${param.success}" class="alert-success">
        ✅ ¡Inscripción completada! Ya puedes entrar.
    </div>
    <div th:if="${param.resetSuccess}" class="alert-success">
        🔑 ¡Contraseña restablecida! Ya puedes entrar con tu nueva clave.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Nombre de entrenador" required autofocus>
        <input type="password" name="password" placeholder="Contraseña secreta" required>
        <button type="submit">Entrar a la Pokédex</button>
    </form>

    <div class="links-container">
        <a href="/register">¿No tienes licencia? Regístrate aquí</a>
        <a href="/forgot-password" class="link-danger">¿Has olvidado tu contraseña?</a>
    </div>
</div>
</body>
</html>
