<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Práctica 2</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; display: flex; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; margin: 10px 0; width: 90%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Iniciar Sesión</h2>
        <div th:if="${param.error}" style="color: red; margin-bottom: 10px;">Usuario o contraseña incorrectos.</div>
        <div th:if="${param.logout}" style="color: green; margin-bottom: 10px;">Has cerrado sesión correctamente.</div>

        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Usuario" required autofocus />
            <input type="password" name="password" placeholder="Contraseña" required />
            <button type="submit">Entrar</button>
            <p>¿No eres entrenador? <a href="/register">Regístrate aquí</a></p>
        </form>
    </div>
</body>
</html>
