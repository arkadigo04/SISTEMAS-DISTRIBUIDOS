<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Administración Pokedex</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="auth-container">
    <div class="box text-center">
        <h2>Portal de Acceso</h2>
        <p class="header-subtitle">Sistema de gestión distribuida de registros.</p>

        <a href="/pruebas-api" class="btn-secondary" style="display: block; text-align: center; box-sizing: border-box;">Acceder al Panel de Control</a>

        <form th:action="@{/logout}" method="post" style="margin-top: 24px;">
            <button type="submit" style="background: none; border: none; color: #6B7280; text-decoration: underline; cursor: pointer; font-size: 0.9em;">Cerrar sesión segura</button>
        </form>
    </div>
</div>
</body>
</html>
