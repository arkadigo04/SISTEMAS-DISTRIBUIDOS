<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscripción de Entrenador</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f0f2f5; display: flex; justify-content: center; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 350px; border-top: 5px solid #17a2b8;}
        input, select { padding: 10px; margin: 8px 0; width: calc(100% - 22px); border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { padding: 12px 20px; background-color: #17a2b8; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; margin-top: 10px;}
        button:hover { background-color: #138496; }
        .error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px; border-left: 4px solid #721c24; text-align: left; font-size: 0.9em;}
        a { color: #007bff; text-decoration: none; font-size: 0.9em; }
        a:hover { text-decoration: underline; }
        .form-group { text-align: left; }
        label { font-size: 0.85em; color: #555; font-weight: bold; margin-left: 2px;}
    </style>
</head>
<body>
<div class="box">
    <h2 style="color: #333; margin-top: 0;">Ficha de Inscripción</h2>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">

        <div class="form-group">
            <label>Nombre de Usuario</label>
            <input type="text" name="username" placeholder="Ej: AshKetchum" required>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Tu contraseña secreta" required>
        </div>

        <div class="form-group">
            <label>Repetir Contraseña</label>
            <input type="password" name="confirmPassword" placeholder="Confirma tu contraseña" required>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

        <div class="form-group">
            <label>Pregunta de Seguridad (Para recuperar clave)</label>
            <select name="securityQuestion" required>
                <option value="" disabled selected>Elige una pregunta...</option>
                <option value="pokemon_inicial">¿Cuál fue tu primer Pokémon?</option>
                <option value="ciudad_natal">¿En qué ciudad naciste?</option>
                <option value="mascota_infancia">¿Nombre de tu primera mascota?</option>
                <option value="lider_favorito">¿Quién es tu líder de gimnasio favorito?</option>
            </select>
        </div>

        <div class="form-group">
            <label>Respuesta Secreta</label>
            <input type="text" name="securityAnswer" placeholder="Tu respuesta (¡no la olvides!)" required>
        </div>

        <button type="submit">Completar Registro</button>
    </form>

    <p style="margin-top: 20px;"><a href="/login">¿Ya estás inscrito? Inicia sesión aquí</a></p>
</div>
</body>
</html>
