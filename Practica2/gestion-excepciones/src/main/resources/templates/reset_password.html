<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecimiento - Sistema Pokedex</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="auth-container">
    <div class="box">
        <h2 class="text-center">Verificación de Identidad</h2>
        <p class="header-subtitle text-center">Complete el formulario para establecer una nueva clave.</p>

        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <div class="pregunta-box" th:text="${pregunta}"></div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="username" th:value="${username}">

            <div class="form-group">
                <label>Respuesta de Seguridad</label>
                <input type="text" name="respuesta" required>
            </div>

            <div class="form-group">
                <label>Nueva Clave de Seguridad</label>
                <input type="password" name="newPassword" required>
            </div>

            <div class="form-group">
                <label>Confirmación de Nueva Clave</label>
                <input type="password" name="confirmNewPassword" required>
            </div>

            <button type="submit" class="btn-primary">Actualizar Clave</button>
        </form>

        <div class="links-container">
            <a href="/login">Cancelar operación</a>
        </div>
    </div>
</div>
</body>
</html>
