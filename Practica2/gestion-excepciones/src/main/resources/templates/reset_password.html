<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; margin-top: 50px;}
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 350px; border-top: 5px solid #28a745;}
        input { padding: 10px; margin: 10px 0; width: calc(100% - 22px); border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 12px 20px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase;}
        .error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px;}
        .pregunta { background: #e9ecef; padding: 15px; border-radius: 6px; font-weight: bold; color: #333; margin-bottom: 15px; border-left: 4px solid #007bff;}
        label { font-size: 0.85em; color: #555; font-weight: bold; display: block; text-align: left; margin-top: 10px;}
    </style>
</head>
<body>
<div class="box">
    <h2>Pregunta de Seguridad</h2>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <div class="pregunta" th:text="${pregunta}"></div>

    <form th:action="@{/reset-password}" method="post">
        <input type="hidden" name="username" th:value="${username}">

        <label>Tu Respuesta Secreta:</label>
        <input type="text" name="respuesta" placeholder="Responde aquí..." required>

        <label>Nueva Contraseña:</label>
        <input type="password" name="newPassword" placeholder="Nueva clave" required>

        <label>Confirmar Nueva Contraseña:</label>
        <input type="password" name="confirmNewPassword" placeholder="Repite la clave" required>

        <button type="submit" style="margin-top: 20px;">Restablecer Clave</button>
    </form>
    <a href="/login" style="display: block; margin-top: 15px; text-decoration: none; color: #007bff;">Cancelar</a>
</div>
</body>
</html>
